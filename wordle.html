<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Wordle Español</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="wordle.css">
</head>

<body>
    <!-- Video de fondo para PC -->
    <video id="bgVideo" autoplay muted loop>
        <source src="video/fondo.mp4" type="video/mp4">
    </video>

    <main id="wordle-container">

        <header class="game-header">
            <h1>WORDLE</h1>
            <h2>Nivel <span id="levelDisplay">1</span></h2>
        </header>

        <div id="game-message" aria-live="polite"></div>

        <section id="game-board" aria-label="Tablero de juego"></section>

        <section id="keyboard" aria-label="Teclado virtual"></section>

        <section class="game-controls">
            <button id="showStatsBtn" type="button">📊 Estadísticas</button>
            <a href="ranking.html" class="ranking-link">🏆 Rankings</a>
            <a href="index.html" id="backBtn">Volver a inicio</a>
            <button id="musicToggleBtn" title="Música">🔊</button>
        </section>

    </main>

    <div 
        id="statsPanel"
        role="dialog"
        aria-modal="true"
        aria-hidden="true"
        style="display:none"
    >
        <div class="stats-header">
            <h3>📊 ESTADÍSTICAS</h3>
            <button id="closeStatsBtn" type="button" class="close-btn">✕</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-number" id="totalWins">0</div>
                <div class="stat-label">Victorias</div>
            </div>
            
            <div class="stat-item">
                <div class="stat-number" id="currentStreak">0</div>
                <div class="stat-label">Racha Actual</div>
            </div>
            
            <div class="stat-item">
                <div class="stat-number" id="maxStreak">0</div>
                <div class="stat-label">Racha Máxima</div>
            </div>
            
            <div class="stat-item">
                <div class="stat-number" id="levelDisplay">1</div>
                <div class="stat-label">Nivel</div>
            </div>
        </div>
        
        <div class="distribution-section">
            <h4>Distribución de Intentos</h4>
            <div class="distribution-grid">
                <div class="dist-row">
                    <span class="dist-label">1</span>
                    <div class="dist-bar-container">
                        <div class="dist-bar" id="bar1" style="width: 0%"></div>
                    </div>
                    <span class="dist-count" id="win1">0</span>
                </div>
                <div class="dist-row">
                    <span class="dist-label">2</span>
                    <div class="dist-bar-container">
                        <div class="dist-bar" id="bar2" style="width: 0%"></div>
                    </div>
                    <span class="dist-count" id="win2">0</span>
                </div>
                <div class="dist-row">
                    <span class="dist-label">3</span>
                    <div class="dist-bar-container">
                        <div class="dist-bar" id="bar3" style="width: 0%"></div>
                    </div>
                    <span class="dist-count" id="win3">0</span>
                </div>
                <div class="dist-row">
                    <span class="dist-label">4</span>
                    <div class="dist-bar-container">
                        <div class="dist-bar" id="bar4" style="width: 0%"></div>
                    </div>
                    <span class="dist-count" id="win4">0</span>
                </div>
                <div class="dist-row">
                    <span class="dist-label">5</span>
                    <div class="dist-bar-container">
                        <div class="dist-bar" id="bar5" style="width: 0%"></div>
                    </div>
                    <span class="dist-count" id="win5">0</span>
                </div>
                <div class="dist-row">
                    <span class="dist-label">6</span>
                    <div class="dist-bar-container">
                        <div class="dist-bar" id="bar6" style="width: 0%"></div>
                    </div>
                    <span class="dist-count" id="win6">0</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="wordle.js"></script>
    <script src="music-control.js"></script>
</body>
</html>
