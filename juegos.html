<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego Clicker del Tren</title>
    <link rel="stylesheet" href="juegos.css">
</head>
<body>
    <!-- Video de fondo para PC -->
    <video id="bgVideo" autoplay muted loop>
        <source src="video/fondo.mp4" type="video/mp4">
    </video>

    <!-- ── COLUMNA IZQUIERDA: Tienda de Rangos + Potenciadores ── -->
    <div id="rankShopContainer">
        <!-- Título sticky: siempre visible arriba aunque se scrollee -->
        <h3 id="rankShopTitle">🏅 Tienda de Rangos</h3>
        <div id="ranksContainer"></div>

        <div id="boostersToggleContainer">
            <button id="boostersToggleBtn">Mostrar Potenciadores</button>
            <div id="boostersContainer" style="display:none; margin-top:10px;"></div>
        </div>
    </div>

    <!-- ── COLUMNA CENTRAL: Clicker del Tren ── -->
    <div class="game-container">

        <!-- RANGO ACTUAL -->
        <div id="playerRankDiv">
            <img id="rankImage" src="images/rank_principiante.png" alt="Rango">
            <div id="rankName">Principiante</div>
        </div>

        <!-- ESTADÍSTICAS -->
        <div class="stats">
            <div>Puntos: <span id="pointsDisplay">0</span></div>
            <div>PPS: <span id="ppsDisplay">0</span></div>
            <div>Clics totales: <span id="clickCounterDiv">0</span></div>
        </div>

        <!-- TREN CLICABLE -->
        <div class="train-container">
            <img id="train" src="images/tren.jpg" alt="Tren" draggable="false">
        </div>

        <!-- MENSAJES -->
        <div id="messages"></div>

        <!-- BOTÓN REINICIAR -->
        <button id="resetBtn">Reiniciar Progreso</button>

    </div>

    <!-- ── COLUMNA DERECHA: Tienda de Mejoras ── -->
    <div id="shopContainer">
        <div id="upgradesContainer"></div>
    </div>

    <!-- BOTÓN VOLVER AL INICIO -->
    <a href="index.html" id="backBtn">Volver a inicio</a>

    <!-- BOTÓN MÚSICA -->
    <button id="musicToggleBtn" title="Música">🔊</button>

    <!-- SCRIPT DEL JUEGO -->
    <script type="module" src="juegos.js"></script>
    <script src="music-control.js"></script>

</body>
</html>
