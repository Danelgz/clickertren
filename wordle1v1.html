<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Wordle 1v1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="wordle1v1.css">
</head>

<body>
    <!-- Video de fondo para PC -->
    <video id="bgVideo" autoplay muted loop>
        <source src="video/fondo.mp4" type="video/mp4">
    </video>

    <!-- Pantalla de Sala -->
    <div id="roomScreen" class="screen active">
        <div class="room-container">
            <header class="game-header">
                <h1>⚔️ WORDLE 1V1</h1>
                <h2>Crea o únete a una sala</h2>
            </header>

            <div class="room-sections">
                <!-- Crear Sala -->
                <div class="room-section">
                    <h3>🏠 Crear Sala</h3>
                    <div class="form-group">
                        <label for="roundsSelect">Número de rondas:</label>
                        <select id="roundsSelect">
                            <option value="1">1 ronda</option>
                            <option value="3">3 rondas</option>
                            <option value="5" selected>5 rondas</option>
                            <option value="10">10 rondas</option>
                            <option value="20">20 rondas</option>
                        </select>
                    </div>
                    <button id="createRoomBtn" class="primary-btn">🎮 Crear Sala</button>
                    <div id="roomCodeDisplay" class="room-code" style="display:none;">
                        <p>Código de sala:</p>
                        <div class="code-text" id="generatedCode"></div>
                        <button id="copyCodeBtn" class="secondary-btn">📋 Copiar</button>
                    </div>
                </div>

                <!-- Unirse a Sala -->
                <div class="room-section">
                    <h3>🚪 Unirse a Sala</h3>
                    <div class="form-group">
                        <input type="text" id="joinCodeInput" placeholder="Introduce el código de sala" maxlength="6">
                    </div>
                    <button id="joinRoomBtn" class="primary-btn">➡️ Unirse a Sala</button>
                </div>
            </div>

            <div id="roomStatus" class="room-status"></div>
            
            <button id="backToMenuBtn" class="back-btn">🔙 Volver al inicio</button>
        </div>
    </div>

    <!-- Pantalla de Juego -->
    <div id="gameScreen" class="screen">
        <div class="game-container">
            <header class="game-header">
                <h1>⚔️ WORDLE 1V1</h1>
                <div class="game-info">
                    <div class="round-info">Ronda <span id="currentRound">1</span> / <span id="totalRounds">5</span></div>
                    <div class="room-code-small">Sala: <span id="roomCodeSmall"></span></div>
                </div>
            </header>

            <!-- Marcador -->
            <div class="scoreboard">
                <div class="player-score">
                    <div class="player-name" id="player1Name">Jugador 1</div>
                    <div class="player-points" id="player1Points">0</div>
                </div>
                <div class="vs">VS</div>
                <div class="player-score">
                    <div class="player-name" id="player2Name">Jugador 2</div>
                    <div class="player-points" id="player2Points">0</div>
                </div>
            </div>

            <div id="game-message" aria-live="polite"></div>

            <!-- Tableros de ambos jugadores -->
            <div class="boards-container">
                <div class="player-board">
                    <h3 id="player1BoardTitle">Tu Tablero</h3>
                    <section id="game-board" aria-label="Tablero de juego"></section>
                </div>
                <div class="player-board">
                    <h3 id="player2BoardTitle">Oponente</h3>
                    <section id="opponent-board" aria-label="Tablero del oponente"></section>
                </div>
            </div>

            <section id="keyboard" aria-label="Teclado virtual"></section>

            <div class="game-controls">
                <button id="leaveRoomBtn" class="danger-btn">🚪 Salir de la sala</button>
            </div>
        </div>
    </div>

    <!-- Pantalla de Resultados -->
    <div id="resultsScreen" class="screen">
        <div class="results-container">
            <header class="game-header">
                <h1>🏆 RESULTADOS</h1>
            </header>

            <div class="final-scoreboard">
                <div class="player-result">
                    <div class="player-name" id="winnerName">Ganador</div>
                    <div class="final-points" id="winnerPoints">0 puntos</div>
                </div>
            </div>

            <div class="results-actions">
                <button id="playAgainBtn" class="primary-btn">🔄 Jugar de nuevo</button>
                <button id="backToMenuBtn2" class="secondary-btn">🔙 Volver al menú</button>
            </div>
        </div>
    </div>

    <script type="module" src="wordle1v1.js"></script>
    <script src="music-control.js"></script>
</body>
</html>
